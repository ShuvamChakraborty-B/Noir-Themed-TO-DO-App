<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case File</title>
    <link rel="stylesheet" href="style.css">
    


</head>

<body>
    <div class="container">
        <div class="todoapp">
            <header class="todo-header">
                <h1>CASE BOARD</h1>
                <p class="subtitle"></p> Track your cases. Close them one by one.</p>
            </header>
            <div class="todo-input-container">
                <input type="text" id="todoInput" class="todo-input" placeholder="Add a new lead..." autocomplete="off" autofocus>
                <button id="addTodoBtn" class="add-btn"> Add

                </button>
            </div>

            <div class="filter-container">
               
                <button class="filter-btn active" data-filters="all">All</button>  <!-- this line has active class attached -->
                <button class="filter-btn" data-filters="active">Active</button>
                <button class="filter-btn" data-filters="completed">Completed</button>


            </div>
            <ul id="todoList" class="todo-list">
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Complete Project Documentation</span>
                    <button class="delete-btn">×</button>

                </li>
                <li class="todo-item completed">
                    <input type="checkbox" class="todo-checkbox" checked>
                    <span class="todo-text">Review pull requests</span>
                    <button class="delete-btn">×</button>

                </li>
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Update team on progress</span>
                    <button class="delete-btn">×</button>

                </li>
            </ul>

            <div class="todo-footer">
                <span class="items-left" id="itemsLeft"><span id ="remainning-count"></span> open cases</span>
                <button id="clearCompletedBtn" class="clear-completed">Clear Completed</button>

            </div>


        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
